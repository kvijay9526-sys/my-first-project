
   <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabyte</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
}

/* Heading glow */
h1 {
  text-align: center;
  margin-top: 100px;
  color: #00f0ff;
  text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
}

/* Cards */
.card {
  background: #111;
  border-radius: 20px;
  transition: 0.4s;
}

/* Glow on hover */
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
}

a {
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<h1>🚀 Parabyte</h1>

<div class="container mt-5">
  <div class="row text-center">

    <div class="col-md-4 mb-4">
      <a href="python.html">
        <div class="card p-4">
          <h3>Python</h3>
        </div>
      </a>
    </div>

    <div class="col-md-4 mb-4">
      <a href="cpp.html">
        <div class="card p-4">
          <h3>C++</h3>
        </div>
      </a>
    </div>

    <div class="col-md-4 mb-4">
      <a href="projects.html">
        <div class="card p-4">
          <h3>Projects</h3>
        </div>
      </a>
    </div>

  </div>
</div>

</body>
</html>
