<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  color: white;
  font-family: Arial;

.card {

}

.card:hover {

  color: white;
}
</style>

        <div class="card p-3">
          <h5>Python</h5>
        </div>
      </a>
    </div>

    <div class="col-4">
      <a href="cpp.html">
        <div class="card p-3">
          <h5>C++</h5>
        </div>
      </a>
    </div>

    <div class="col-4">
      <a href="projects.html">
        <div class="card p-3">
          <h5>Projects</h5>
        </div>
      </a>
    </div>

  </div>
</div>

</html>
